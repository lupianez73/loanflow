# ═══════════════════════════════════════════════════════════════════════
# DOCKER COMPOSE — Full local stack: app + MS SQL Server
# ═══════════════════════════════════════════════════════════════════════
# Run: docker compose up -d
# Stop: docker compose down

version: '3.9'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mssql
    restart: unless-stopped

  # MS SQL Server 2022 — a common production DB in enterprise stacks
  # For local dev with SQLite: comment this service out
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64  # required on Apple Silicon Macs
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Password123!"
      MSSQL_PID: "Developer"  # free Developer edition license
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  mssql_data:

# To use MS SQL instead of SQLite, update DATABASE_URL to:
# sqlserver://localhost:1433;database=LoanFlow;user=sa;password=YourStrong@Password123!;trustServerCertificate=true
